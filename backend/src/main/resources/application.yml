spring:
  application:
    name: volleyball-tournament-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/volleyball}
    username: ${DB_USERNAME:volleyball}
    password: ${DB_PASSWORD:volleyball}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Render's managed Postgres silently drops idle connections well under Hikari's defaults
      # (30 min max-lifetime), so a pooled connection can go stale and only get discovered (and
      # retried) when a real request needs it — surfacing as an intermittent empty/failed response
      # that "fixes itself" once the pool recycles. keepalive-time proactively pings idle
      # connections so they're recycled before the server drops them.
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 240000
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      # Kept above app.storage.max-photo-bytes so the app's own validation returns a clean
      # 400/413 instead of Tomcat rejecting the multipart request at the connector level.
      max-file-size: 12MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never

server:
  port: ${PORT:8080}
  tomcat:
    # Let Tomcat read (swallow) an over-limit request body so a proper error response can be
    # returned, instead of aborting the connection (which surfaces as ERR_CONNECTION_RESET).
    max-swallow-size: -1

app:
  jwt:
    # Base64-encoded HMAC secret. Override in deployed envs. This default is for LOCAL DEV ONLY.
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1sb2NhbC1kZXYtb25seS1zZWNyZXQta2V5LTEyMzQ1Ng==}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL:30}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL:7}
  storage:
    max-photo-bytes: 10485760
  admin:
    # Seeded on first startup if no admin exists. Change in production.
    email: ${ADMIN_EMAIL:admin@volleyball.local}
    password: ${ADMIN_PASSWORD:admin123}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  brevo:
    api-key: ${BREVO_API_KEY}

logging:
  level:
    com.volleyball.tournament: INFO