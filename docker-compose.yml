services:
  postgres:
    image: postgres:16
    container_name: volleyball-postgres
    environment:
      POSTGRES_DB: volleyball
      POSTGRES_USER: volleyball
      POSTGRES_PASSWORD: volleyball
    ports:
      - "5432:5432"
    volumes:
      - volleyball_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volleyball -d volleyball"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  volleyball_postgres_data:
